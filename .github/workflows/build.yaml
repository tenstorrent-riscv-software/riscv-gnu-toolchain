name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - tt-master
  pull_request:
    branches:
      - tt-master

env:
  submodule_paths: |
    binutils
    gcc
    gdb
    glibc
    llvm
    qemu
    .git/modules

jobs:
  submodule_cache:
    name: Initialize submodule cache
    runs-on: tt-ubuntu-2204-xlarge-stable
    outputs:
      key: ${{ steps.keygen.outputs.smcache_key }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate submodule cache key
        id: keygen
        run: echo "smcache_key=smcache-$(printf $(git submodule | sha1sum))" >> $GITHUB_OUTPUT

      - name: Setup submodule cache
        id: smcache
        uses: actions/cache@v4
        with:
          path: ${{ env.submodule_paths }}
          key: ${{ steps.keygen.outputs.smcache_key }}

      - name: Checkout required submodules
        if: steps.smcache.outputs.cache-hit != 'true'
        run: git submodule update --init -j $(nproc) --depth 1 $(echo ${submodule_paths} | sed '$d' | tr '\n' ' ')

      - name: Storage size optimization
        if: steps.smcache.outputs.cache-hit != 'true'
        run: |
          git submodule foreach 'git maintenance run'

  build:
    runs-on: ${{ matrix.os }}
    needs: [submodule_cache]
    env:
      smcache_key: ${{ needs.submodule_cache.outputs.key }}
    strategy:
      matrix:
        os:     [tt-ubuntu-2204-xlarge-stable, tt-ubuntu-2404-large-stable]
        mode:   [linux]
        target: [rv64gc-lp64d]
        compiler: [gcc]
        exclude:
          - mode: musl
            compiler: llvm
          - mode: uclibc
            compiler: llvm
    steps:
      - uses: actions/checkout@v4

      - name: install dependencies
        run: sudo ./.github/setup-apt.sh

      - name: Load submodule cache
        uses: actions/cache/restore@v4
        with:
          path: ${{ env.submodule_paths }}
          key: ${{ env.smcache_key }}

      - name: build toolchain
        run: |
          TARGET_TUPLE=($(echo ${{ matrix.target }} | tr "-" "\n"))
          ./configure --prefix=/mnt/riscv --with-arch=${TARGET_TUPLE[0]} --with-abi=${TARGET_TUPLE[1]} --enable-llvm --enable-linux --with-sim=qemu --enable-qemu-system
          sudo mkdir /mnt/riscv
          sudo chown $USER:$USER /mnt/riscv
          make -j $(nproc) all build-sim

      - name: tarball build
        run: |
          du -s -h /mnt/riscv
          ./.github/dedup-dir.sh /mnt/riscv/
          XZ_OPT="-e -T0" tar cJvf riscv.tar.xz -C /mnt/ riscv/

      - name: make report
        if: |
          matrix.os == 'ubuntu-24.04'
          && (matrix.mode == 'linux' || matrix.mode == 'newlib')
          && matrix.compiler == 'gcc'
        run: |
          make report-${{ matrix.mode }} -j $(nproc)

      - name: generate prebuilt toolchain name
        id:   toolchain-name-generator
        run: |
          if [[ "${{ matrix.target }}" == *"32"* ]]; then BITS=32; else BITS=64; fi
          case "${{ matrix.mode }}" in
            "linux")
              MODE="glibc";;
            "musl")
              MODE="musl";;
            "uclibc")
              MODE="uclibc-ng";;
            *)
              MODE="elf";;
          esac
          case "${{ matrix.os }}" in
             "tt-ubuntu-2204-xlarge-stable")
               OS="ubuntu-22.04";;
             "tt-ubuntu-2404-large-stable")
               OS="ubuntu-24.04";;
             *)
               OS="${{ matrix.os }}";;
          esac
          echo "TOOLCHAIN_NAME=riscv$BITS-$MODE-$OS-${{ matrix.compiler }}-nightly" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.toolchain-name-generator.outputs.TOOLCHAIN_NAME }}
          path: riscv.tar.xz
